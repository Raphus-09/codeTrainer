        <li><b>1단계 — 음이름:</b> 지판 위 모든 음의 이름을 즉답할 수 있게 만드세요. 모든 것의 기초입니다.</li>
        <li><b>2단계 — 음정(인터벌):</b> 두 음 사이의 거리를 모양으로 익히세요. 코드와 스케일은 결국 음정의 조합입니다.</li>
        <li><b>3단계 — 코드 · 화음 구조:</b> 코드의 구성음을 알고(코드→구성음), 구성음에서 코드를 읽고(구성음→코드), 지판 위에서 직접 짚어 보세요(코드 톤 짚기).</li>
      </ul>
      <div class="tip">🔁 이 앱은 <b>틀린 문제일수록 더 자주 출제</b>합니다(간격 반복 원리). 기록은 이 브라우저에 저장되므로 매일 조금씩 이어서 연습하세요.</div>
    </div>

    <div class="card guide">
      <h2>옥타브 셰이프 — 음이름 암기 지름길</h2>
      <p>지판의 모든 음을 하나씩 외울 필요가 없습니다. 낮은 두 줄(6·5번 줄)의 음만 확실히 외우고, 옥타브 모양으로 나머지를 찾으세요.</p>
      <ul>
        <li><b>기타:</b> 6번 줄의 음에서 <b>두 줄 아래 + 2프렛 오른쪽</b>이 같은 음(한 옥타브 위)입니다. 5번 줄→3번 줄도 동일. 단, 2번 줄(B줄)을 건너갈 때는 3프렛 오른쪽이 됩니다.</li>
        <li><b>베이스:</b> 4현 베이스는 모든 줄이 완전4도 간격이라 <b>항상 두 줄 아래 + 2프렛 오른쪽</b>이 옥타브입니다.</li>
      </ul>
      <div class="tip">🎯 「음 위치 찾기」에서 한 음을 골라 지판 전체에서 찾는 연습이 바로 이 감각을 만듭니다.</div>
    </div>

    <div class="card guide">
      <h2>CAGED 시스템 (기타)</h2>
      <p>기타의 모든 코드는 C·A·G·E·D 다섯 가지 오픈 코드 모양이 지판 위를 이동한 것입니다. 예를 들어 F 코드는 E 모양을 1프렛 올린 것이고, B♭ 코드는 A 모양을 1프렛 올린 것입니다.</p>
      <ul>
        <li>「코드 퀴즈」의 바레 코드는 모두 E 셰이프와 A 셰이프입니다. <b>루트음(주황 점)의 위치</b>만 알면 이름을 바로 알 수 있습니다.</li>
        <li>E 셰이프 → 루트가 6번 줄, A 셰이프 → 루트가 5번 줄. 그래서 1단계(음이름)가 먼저인 것입니다.</li>
      </ul>
    </div>

    <div class="card guide">
      <h2>베이스 — 패턴으로 생각하기</h2>
      <p>베이스는 모든 줄이 완전4도 간격이라 <b>하나의 운지 모양이 12개 조 전부에 통합니다</b>. 「베이스 패턴」에서 트라이어드·아르페지오·스케일 모양을 익히고, 루트만 바꿔가며 반복하세요.</p>
      <ul>
        <li>메이저 vs 마이너 트라이어드의 차이는 3음 하나(1프렛)뿐입니다. 모양의 차이를 손과 눈으로 기억하세요.</li>
        <li>베이스 라인의 뼈대는 루트–5도–옥타브입니다. 여기에 3음·7음을 더하면 코드 톤 라인이 됩니다.</li>
      </ul>
    </div>

    <div class="card guide">
      <h2>화성학을 지판과 건반에서 — 도수로 보기</h2>
      <p>「지판 탐색」과 「키보드」에서 라벨을 <b>도수</b>로 놓고 보세요. 음이름 대신 R(루트)·3·5·7로 보면 조가 바뀌어도 같은 구조가 유지된다는 것을 알게 됩니다.</p>
      <ul>
        <li><b>3음</b>이 장3도(3)면 메이저, 단3도(♭3)면 마이너 — 코드의 성격은 3음이 결정합니다.</li>
        <li><b>7음</b>: ♭7이 붙으면 도미넌트7, 7이면 메이저7.</li>
        <li>건반은 음이 일렬이라 구조 이해에 가장 좋고, 지판은 모양이 이동 가능해 실전에 좋습니다. 둘을 오가며 보세요.</li>
      </ul>
      <div class="tip">🎼 추천 루틴: ① 키보드에서 C 메이저 스케일 구조 확인 → ② 지판 탐색에서 같은 스케일 관찰 → ③ 「코드 톤 짚기」로 확인. 하루 10분이면 충분합니다.</div>
    </div>

    <div class="card guide">
      <h2>리듬 연습</h2>
      <ul>
        <li><b>메트로놈:</b> 스케일·패턴을 한 음씩 클릭에 맞춰 연주하세요. 느리게(60~80) 정확히 → 조금씩 올리기.</li>
        <li><b>8비트 드럼:</b> 실제 곡 느낌으로 코드 전환이나 베이스 라인을 연습할 때 좋습니다.</li>
        <li><b>탭 템포:</b> 좋아하는 곡의 BPM을 재서 그 템포로 연습해 보세요.</li>
      </ul>
    </div>`;
}

/* ==================== 내비게이션 ==================== */

const PARTS = [
  { id: 'quiz', label: '🎯 퀴즈' },
  { id: 'rhythm', label: '🎵 리듬' },
  { id: 'learn', label: '📚 배우기' },
];

const QUIZ_MODES = [
  { id: 'course', label: '🗺️ 커리큘럼', mount: mountCourse },
  { id: 'daily', label: '📅 일일 학습', mount: mountDaily },
  { id: 'note', label: '음이름 퀴즈', mount: mountNoteQuiz },
  { id: 'find', label: '음 위치 찾기', mount: mountFindNote },
  { id: 'interval', label: '음정 퀴즈', mount: mountIntervalQuiz },
  { id: 'chord', label: '코드 퀴즈', mount: mountChordQuiz, only: 'guitar' },
  { id: 'harmony', label: '화음 퀴즈', mount: mountHarmonyQuiz },
  { id: 'chordNotes', label: '코드→구성음', mount: mountChordNotesQuiz },
  { id: 'notesChord', label: '구성음→코드', mount: mountNotesChordQuiz },
  { id: 'chordTouch', label: '코드 톤 짚기', mount: mountChordTouchQuiz },
];

const RHYTHM_MODES = [
  { id: 'metro', label: '메트로놈 · 드럼', mount: mountMetro },
  { id: 'tap', label: '탭 템포 (BPM 측정)', mount: mountTap },
];

const LEARN_MODES = [
  { id: 'explorer', label: '지판 탐색', mount: mountExplorer, only: ['guitar', 'bass'] },
  { id: 'chordDict', label: '코드 사전', mount: mountChordDict, only: 'guitar' },
  { id: 'bassPatterns', label: '베이스 패턴', mount: mountBassPatterns, only: 'bass' },
  { id: 'keyboard', label: '건반 탐색', mount: mountKeyboard },
  { id: 'guide', label: '학습 가이드', mount: mountGuide },
];

const modeVisible = (m) =>
  !m.only || (Array.isArray(m.only) ? m.only.includes(state.instrument) : m.only === state.instrument);

function currentModes() {
  if (state.part === 'quiz') return QUIZ_MODES;
  if (state.part === 'rhythm') return RHYTHM_MODES;
  return LEARN_MODES;
}
function currentModeId() {
  if (state.part === 'quiz') return state.quizMode;
  if (state.part === 'rhythm') return state.rhythmMode;
  return state.learnMode;
}

function mountCurrent() {
  stopMetro();
  tapHandler = null;
  const m = currentModes().find((x) => x.id === currentModeId());
  m.mount();
}

function renderNav() {
  const pt = document.getElementById('partToggle');
  pt.innerHTML = PARTS
    .map((p) => `<button data-part="${p.id}" class="${state.part === p.id ? 'on' : ''}">${p.label}</button>`)
    .join('');
  pt.querySelectorAll('button').forEach((b) =>
    b.addEventListener('click', () => {
      if (state.part === b.dataset.part) return;
      state.part = b.dataset.part;
      renderNav();
      mountCurrent();
    })
  );

  const tabs = document.getElementById('tabs');
  tabs.innerHTML = currentModes()
    .filter(modeVisible)
    .map((m) => `<button data-mode="${m.id}" class="${currentModeId() === m.id ? 'on' : ''}">${m.label}</button>`)
    .join('');
  tabs.querySelectorAll('button').forEach((b) =>
    b.addEventListener('click', () => {
      if (state.part === 'quiz') state.quizMode = b.dataset.mode;
      else if (state.part === 'rhythm') state.rhythmMode = b.dataset.mode;
      else state.learnMode = b.dataset.mode;
      renderNav();
      mountCurrent();
    })
  );
}

function setQuizMode(id) {
  state.part = 'quiz';
  state.quizMode = id;
  renderNav();
  mountCurrent();
}

function renderInstToggle() {
  const el = document.getElementById('instToggle');
  el.innerHTML = Object.entries(INSTRUMENTS)
    .map(([id, inst]) => `<button data-inst="${id}" class="${state.instrument === id ? 'on' : ''}">${inst.label}</button>`)
    .join('');
  el.querySelectorAll('button').forEach((b) =>
    b.addEventListener('click', () => {
      if (state.instrument === b.dataset.inst) return;
      state.instrument = b.dataset.inst;
      if (!QUIZ_MODES.some((m) => m.id === state.quizMode && modeVisible(m))) state.quizMode = 'course';
      if (!LEARN_MODES.some((m) => m.id === state.learnMode && modeVisible(m))) {
        state.learnMode = isKeyboard() ? 'keyboard' : 'explorer';
      }
      renderInstToggle();
      renderNav();
      mountCurrent();
    })
  );
}

renderInstToggle();
renderNav();
renderHeaderStats();
mountCurrent();
</script>
